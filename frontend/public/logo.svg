<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Fork -->
  <g transform="translate(10, 8)" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Fork handle -->
    <line x1="16" y1="64" x2="16" y2="24"/>
    <!-- Fork tines -->
    <line x1="8" y1="8" x2="8" y2="28"/>
    <line x1="16" y1="8" x2="16" y2="28"/>
    <line x1="24" y1="8" x2="24" y2="28"/>
    <!-- Fork base curve -->
    <path d="M8 28 Q8 34 16 34 Q24 34 24 28"/>
  </g>

  <!-- "da Ciccio" text -->
  <text x="140" y="32" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="16" fill="#a8a29e" letter-spacing="3" font-style="italic">da</text>
  <text x="140" y="62" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" fill="#ffffff" font-weight="bold" letter-spacing="2">Ciccio</text>

  <!-- Decorative line left -->
  <line x1="52" y1="40" x2="88" y2="40" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <!-- Decorative line right -->
  <line x1="192" y1="40" x2="228" y2="40" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>

  <!-- Knife -->
  <g transform="translate(240, 8)" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Knife handle -->
    <line x1="16" y1="64" x2="16" y2="34"/>
    <!-- Knife blade -->
    <path d="M16 34 L16 8 Q16 6 18 6 L22 8 Q24 12 24 18 L24 28 Q24 34 16 34 Z"/>
  </g>

  <!-- Small decorative diamond -->
  <polygon points="140,72 143,75 140,78 137,75" fill="#f59e0b" opacity="0.7"/>
</svg>
