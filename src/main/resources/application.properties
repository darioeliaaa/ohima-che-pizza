spring.application.name=beauty-center-backend
server.port=8080

# PostgreSQL - configurare tramite variabili d'ambiente o file .env
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Email - Gmail SMTP (configurare con le proprie credenziali)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Base URL per i link nelle email
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Passkey proprietario (secondo fattore di sicurezza per area owner)
owner.passkey=${OWNER_PASSKEY:}

# CORS - origini consentite (separare con virgola)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

# WebAuthn/FIDO2 Passkey Configuration
webauthn.rp.id=${WEBAUTHN_RP_ID:localhost}
webauthn.rp.name=${WEBAUTHN_RP_NAME:Centro Estetico Manager}
webauthn.rp.origins=${WEBAUTHN_RP_ORIGINS:http://localhost:5173,http://localhost:8080}

# File upload limits
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

# ── Sicurezza Produzione ──
# Cookie security
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Response compression
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# 1. Diamo a Spring 30 secondi di pazienza per aspettare che Neon si svegli, invece di andare subito in errore
spring.datasource.hikari.connection-timeout=30000

# 2. Diciamo a Spring di chiudere e pulire le connessioni a 4 minuti (240000 millisecondi) PRIMA che Neon lo spenga in faccia a Spring ai fatidici 5 minuti
spring.datasource.hikari.max-lifetime=240000

# 3. Mantieni le connessioni fresche e verificate
spring.datasource.hikari.keepalive-time=120000